<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Booking Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">WanderLust</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#" class="active" data-target="flights">Flights</a></li>
                <li><a href="#" data-target="hotels">Hotels</a></li>
                <li><a href="#" data-target="cabs">Cabs</a></li>
                <li><a href="#" data-target="packages">Packages</a></li>
            </ul>
        </nav>
        <div class="user-actions">
            <button class="btn btn-outline">Log In</button>
            <button class="btn btn-primary">Sign Up</button>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Discover The World With Us</h1>
                <p>Book flights, hotels, and cabs seamlessly with our unified platform.</p>
            </div>
        </section>

        <section class="search-section">
            <div class="glass-card search-container">
                <div class="search-tabs">
                    <button class="tab-btn active" data-target="flights">Flights</button>
                    <button class="tab-btn" data-target="hotels">Hotels</button>
                    <button class="tab-btn" data-target="cabs">Cabs</button>
                    <button class="tab-btn" data-target="packages">Packages</button>
                </div>
                
                <div class="search-form-container">
                    <!-- Dynamic form based on active tab -->
                    <form id="search-form" class="search-form">
                        <div class="input-group">
                            <label>From</label>
                            <input type="text" placeholder="Where from?">
                        </div>
                        <div class="input-group">
                            <label>To</label>
                            <input type="text" placeholder="Where to?">
                        </div>
                        <div class="input-group">
                            <label>Date</label>
                            <input type="date">
                        </div>
                        <button type="submit" class="btn btn-primary btn-search">Search</button>
                    </form>
                </div>
            </div>
        </section>

        <section class="results-section" id="results-section" style="display: none;">
            <h2>Available Options</h2>
            <div class="results-grid" id="results-grid">
                <!-- Results will be injected here via JS -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 WanderLust Travel Platform. All Rights Reserved.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
