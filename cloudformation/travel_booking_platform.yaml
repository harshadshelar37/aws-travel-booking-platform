AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-Ready Travel Booking Platform on AWS.
  Public (ALB) -> App Layer (EC2 Auto Scaling) -> Private DB Layer (RDS MySQL)
  Fully Free Tier Eligible configuration by default.

# ============================================================
# PARAMETERS
# ============================================================
Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    Description: Environment name prefix for resources

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16

  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24

  PrivateDBSubnet1CIDR:
    Type: String
    Default: 10.0.21.0/24
  PrivateDBSubnet2CIDR:
    Type: String
    Default: 10.0.22.0/24

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: "bat17"
    Description: EC2 Key Pair for SSH access

  InstanceType:
    Type: String
    Default: t3.micro
    Description: Free Tier eligible EC2 instance type

  AppMinSize:
    Type: Number
    Default: 1
  AppMaxSize:
    Type: Number
    Default: 2
  AppDesiredCapacity:
    Type: Number
    Default: 1

  DBUsername:
    Type: String
    Default: admin
    NoEcho: true

  DBPassword:
    Type: String
    Default: "TravelDbPass123!"
    NoEcho: true
    MinLength: 8
    Description: Master password for RDS (min 8 chars)

  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    Description: Free Tier eligible DB instance class

  EnableMultiAZ:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Multi-AZ is NOT Free Tier eligible - keep false

  DBAllocatedStorage:
    Type: Number
    Default: 20

  NotificationEmail:
    Type: String
    Default: "alerts@example.com"
    Description: Email address to receive CloudWatch SNS alerts

# ============================================================
# RESOURCES
# ============================================================
Resources:

  # ---------------- VPC ----------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-igw

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ---------------- Public Subnets ----------------
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-subnet-2

  # ---------------- Private DB Subnets ----------------
  PrivateDBSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateDBSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-private-db-subnet-1

  PrivateDBSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateDBSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-private-db-subnet-2

  # ---------------- Route Tables ----------------
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ---------------- Security Groups ----------------
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from internet to ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-alb-sg

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from ALB SG and restricted SSH
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0 # Restricted to 0.0.0.0/0 for ease of access (update later)
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ec2-sg

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow MySQL from app tier SG
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-rds-sg



  # ---------------- IAM Role ----------------
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-travel-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy


  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  # ---------------- SNS Topic for Alerts ----------------
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${EnvironmentName}-travel-alerts

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # ---------------- Launch Template ----------------
  AppLaunchTemplate:
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          default:
            - setup
        setup:
          files:
            /etc/nginx/nginx.conf:
              content: |
                events {
                    worker_connections 1024;
                }
                
                http {
                    include       /etc/nginx/mime.types;
                    default_type  application/octet-stream;
                    charset       utf-8;
                
                    types {
                        text/html                  html htm;
                        text/css                   css;
                        application/javascript     js;
                        application/json           json;
                    }
                    
                    sendfile        on;
                    keepalive_timeout  65;
                    
                    server {
                        listen 80;
                        server_name _;
                        
                        root /home/ec2-user/app/frontend;
                        index index.html;
                        
                        location / {
                            try_files $uri $uri/ /index.html;
                        }
                        
                        location /health {
                            proxy_pass http://127.0.0.1:5000;
                            proxy_set_header Host $host;
                        }
                        
                        location /api/ {
                            proxy_pass http://127.0.0.1:5000;
                            proxy_set_header Host $host;
                            proxy_set_header X-Real-IP $remote_addr;
                        }
                    }
                }
                
              mode: '000644'
              owner: 'root'
              group: 'root'
            /etc/systemd/system/travel-backend.service:
              content: |
                [Unit]
                Description=Gunicorn instance to serve travel backend
                After=network.target
                
                [Service]
                User=ec2-user
                Group=ec2-user
                WorkingDirectory=/home/ec2-user/app/backend
                Environment="PATH=/usr/local/bin:/usr/bin"
                EnvironmentFile=/home/ec2-user/app/backend/.env
                ExecStart=/usr/local/bin/gunicorn --workers 3 --bind 127.0.0.1:5000 app:app
                
                [Install]
                WantedBy=multi-user.target
                
              mode: '000644'
              owner: 'root'
              group: 'root'
            /home/ec2-user/app/backend/schema.sql:
              content: |
                CREATE DATABASE IF NOT EXISTS travel_db;
                USE travel_db;
                
                CREATE TABLE IF NOT EXISTS users (
                    id INT AUTO_INCREMENT PRIMARY KEY,
                    name VARCHAR(255) NOT NULL,
                    email VARCHAR(255) UNIQUE NOT NULL,
                    password VARCHAR(255) NOT NULL,
                    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
                );
                
                CREATE TABLE IF NOT EXISTS flights (
                    id INT AUTO_INCREMENT PRIMARY KEY,
                    airline VARCHAR(100) NOT NULL,
                    origin VARCHAR(10) NOT NULL,
                    destination VARCHAR(10) NOT NULL,
                    departure_time DATETIME NOT NULL,
                    arrival_time DATETIME NOT NULL,
                    price DECIMAL(10,2) NOT NULL,
                    class_type VARCHAR(50) DEFAULT 'Economy',
                    duration VARCHAR(50)
                );
                
                CREATE TABLE IF NOT EXISTS hotels (
                    id INT AUTO_INCREMENT PRIMARY KEY,
                    name VARCHAR(255) NOT NULL,
                    location VARCHAR(255) NOT NULL,
                    rating DECIMAL(3,1) DEFAULT 4.0,
                    price_per_night DECIMAL(10,2) NOT NULL,
                    amenities TEXT
                );
                
                CREATE TABLE IF NOT EXISTS cabs (
                    id INT AUTO_INCREMENT PRIMARY KEY,
                    type VARCHAR(100) NOT NULL,
                    driver_name VARCHAR(255),
                    price_per_km DECIMAL(10,2) NOT NULL,
                    availability BOOLEAN DEFAULT TRUE
                );
                
                CREATE TABLE IF NOT EXISTS buses (
                    id INT AUTO_INCREMENT PRIMARY KEY,
                    operator_name VARCHAR(255) NOT NULL,
                    bus_type VARCHAR(100) NOT NULL,
                    origin VARCHAR(100) NOT NULL,
                    destination VARCHAR(100) NOT NULL,
                    pickup_point VARCHAR(255) NOT NULL,
                    drop_point VARCHAR(255) NOT NULL,
                    duration VARCHAR(50) NOT NULL,
                    price DECIMAL(10,2) NOT NULL
                );
                
                CREATE TABLE IF NOT EXISTS packages (
                    id INT AUTO_INCREMENT PRIMARY KEY,
                    destination VARCHAR(255) NOT NULL,
                    days INT NOT NULL,
                    price DECIMAL(10,2) NOT NULL,
                    includes TEXT
                );
                
                CREATE TABLE IF NOT EXISTS bookings (
                    id INT AUTO_INCREMENT PRIMARY KEY,
                    user_id INT,
                    service_type VARCHAR(50) NOT NULL,
                    service_id INT NOT NULL,
                    total_price DECIMAL(10,2) NOT NULL,
                    status VARCHAR(50) DEFAULT 'Confirmed',
                    booking_date TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                    FOREIGN KEY (user_id) REFERENCES users(id)
                );
                
              mode: '000644'
              owner: 'ec2-user'
              group: 'ec2-user'
            /home/ec2-user/app/backend/seed.py:
              content: |
                import os
                import mysql.connector
                import random
                from datetime import datetime, timedelta
                
                DB_HOST = os.getenv("DB_HOST", "localhost")
                DB_USER = os.getenv("DB_USER", "root")
                DB_PASS = os.getenv("DB_PASS", "")
                
                try:
                    conn = mysql.connector.connect(host=DB_HOST, user=DB_USER, password=DB_PASS)
                    cursor = conn.cursor()
                    
                    # Execute Schema
                    with open('/home/ec2-user/app/backend/schema.sql', 'r') as f:
                        sql_script = f.read()
                        
                    for statement in sql_script.split(';'):
                        if statement.strip():
                            cursor.execute(statement)
                    
                    # Seed Flights
                    cursor.execute("SELECT COUNT(*) FROM travel_db.flights")
                    if cursor.fetchone()[0] == 0:
                        airlines = ["IndiGo", "Air India", "Vistara", "SpiceJet", "Akasa Air"]
                        cities = ["DEL", "BOM", "BLR", "HYD", "MAA", "CCU", "PNQ", "GOI"]
                        print("Seeding flights...")
                        for _ in range(500):
                            origin = random.choice(cities)
                            dest = random.choice([c for c in cities if c != origin])
                            departure = datetime.now() + timedelta(days=random.randint(1, 30), hours=random.randint(1, 23))
                            arrival = departure + timedelta(hours=random.randint(1, 4), minutes=random.randint(0, 59))
                            duration = f"{(arrival - departure).seconds // 3600}h {((arrival - departure).seconds // 60) % 60}m"
                            price = round(random.uniform(2500, 15000), 2)
                            airline = random.choice(airlines)
                            cursor.execute(
                                "INSERT INTO travel_db.flights (airline, origin, destination, departure_time, arrival_time, price, duration) VALUES (%s, %s, %s, %s, %s, %s, %s)",
                                (airline, origin, dest, departure, arrival, price, duration)
                            )
                    
                    # Seed Hotels
                    cursor.execute("SELECT COUNT(*) FROM travel_db.hotels")
                    if cursor.fetchone()[0] == 0:
                        print("Seeding hotels...")
                        cities = ["Delhi", "Mumbai", "Bangalore", "Hyderabad", "Chennai", "Kolkata", "Pune", "Goa"]
                        hotel_prefixes = ["Taj", "Oberoi", "ITC", "Radisson", "Marriott", "Hyatt", "Novotel", "Lemon Tree"]
                        for _ in range(200):
                            name = f"{random.choice(hotel_prefixes)} {random.choice(['Grand', 'Palace', 'Residency', 'Suites', 'Resort'])}"
                            location = random.choice(cities)
                            rating = round(random.uniform(3.5, 5.0), 1)
                            price = round(random.uniform(1500, 25000), 2)
                            amenities = "WiFi, Pool, Spa, Breakfast"
                            cursor.execute(
                                "INSERT INTO travel_db.hotels (name, location, rating, price_per_night, amenities) VALUES (%s, %s, %s, %s, %s)",
                                (name, location, rating, price, amenities)
                            )
                
                    # Seed Cabs
                    cursor.execute("SELECT COUNT(*) FROM travel_db.cabs")
                    if cursor.fetchone()[0] == 0:
                        print("Seeding cabs...")
                        types = ["Sedan", "SUV", "Hatchback", "Luxury"]
                        for i in range(100):
                            ctype = random.choice(types)
                            price = round(random.uniform(12.0, 35.0), 2)
                            cursor.execute(
                                "INSERT INTO travel_db.cabs (type, driver_name, price_per_km) VALUES (%s, %s, %s)",
                                (ctype, f"Driver {i}", price)
                            )
                            
                    # Seed Packages
                    cursor.execute("SELECT COUNT(*) FROM travel_db.packages")
                    if cursor.fetchone()[0] == 0:
                        print("Seeding packages...")
                        dests = ["Goa", "Manali", "Kerala", "Andaman", "Kashmir", "Dubai", "Maldives"]
                        for _ in range(50):
                            dest = random.choice(dests)
                            days = random.randint(3, 10)
                            price = round(random.uniform(15000, 150000), 2)
                            cursor.execute(
                                "INSERT INTO travel_db.packages (destination, days, price, includes) VALUES (%s, %s, %s, %s)",
                                (dest, days, price, "Flights, Hotel, Transfers, Meals")
                            )
                
                    # Seed Buses
                    cursor.execute("SELECT COUNT(*) FROM travel_db.buses")
                    if cursor.fetchone()[0] == 0:
                        print("Seeding buses...")
                        operators = ["VRL Travels", "SRS Travels", "Orange Travels", "Neeta Travels", "Kallada"]
                        bus_types = ["Volvo AC Semi-Sleeper", "Scania AC Multi-Axle", "Non-AC Sleeper", "AC Sleeper"]
                        cities = ["Delhi", "Mumbai", "Bangalore", "Hyderabad", "Chennai", "Kolkata", "Pune", "Goa", "Manali", "Jaipur"]
                        for _ in range(150):
                            origin = random.choice(cities)
                            dest = random.choice([c for c in cities if c != origin])
                            operator = random.choice(operators)
                            btype = random.choice(bus_types)
                            price = round(random.uniform(500, 3000), 2)
                            duration = f"{random.randint(5, 18)}h {random.randint(0, 59)}m"
                            pickup = f"{random.choice(['Main', 'City Center', 'Highway', 'Terminal', 'Station'])} Point"
                            drop = f"{random.choice(['Main', 'City Center', 'Highway', 'Terminal', 'Station'])} Point"
                            cursor.execute(
                                "INSERT INTO travel_db.buses (operator_name, bus_type, origin, destination, pickup_point, drop_point, duration, price) VALUES (%s, %s, %s, %s, %s, %s, %s, %s)",
                                (operator, btype, origin, dest, pickup, drop, duration, price)
                            )
                
                    conn.commit()
                    cursor.close()
                    conn.close()
                    print("Seeding completed successfully!")
                except Exception as e:
                    print(f"Database error: {e}")
                
              mode: '000755'
              owner: 'ec2-user'
              group: 'ec2-user'
            /home/ec2-user/app/backend/app.py:
              content: |
                import os
                from flask import Flask, jsonify, request, send_from_directory
                import mysql.connector
                from mysql.connector import Error
                from dotenv import load_dotenv
                from werkzeug.security import generate_password_hash, check_password_hash
                
                load_dotenv()
                
                app = Flask(__name__, static_folder='../frontend', static_url_path='/')
                
                DB_HOST = os.getenv("DB_HOST", "localhost")
                DB_USER = os.getenv("DB_USER", "root")
                DB_PASS = os.getenv("DB_PASS", "")
                
                def get_db_connection():
                    try:
                        conn = mysql.connector.connect(
                            host=DB_HOST,
                            user=DB_USER,
                            password=DB_PASS,
                            database="travel_db"
                        )
                        return conn
                    except Error as e:
                        print(f"Error connecting to MySQL: {e}")
                        return None
                
                @app.route('/')
                def index():
                    return app.send_static_file('index.html')
                
                @app.route('/health')
                def health():
                    return jsonify({"status": "healthy"}), 200
                
                # ----- AUTHENTICATION ROUTES -----
                
                @app.route('/api/register', methods=['POST'])
                def register():
                    data = request.json
                    name = data.get('name')
                    email = data.get('email')
                    password = data.get('password')
                    
                    if not name or not email or not password:
                        return jsonify({"error": "Missing fields"}), 400
                        
                    conn = get_db_connection()
                    if not conn: return jsonify({"error": "Database connection failed"}), 500
                    
                    try:
                        cursor = conn.cursor(dictionary=True)
                        cursor.execute("SELECT id FROM users WHERE email = %s", (email,))
                        if cursor.fetchone():
                            return jsonify({"error": "Email already registered"}), 409
                            
                        hashed_pw = generate_password_hash(password)
                        cursor.execute(
                            "INSERT INTO users (name, email, password) VALUES (%s, %s, %s)",
                            (name, email, hashed_pw)
                        )
                        conn.commit()
                        user_id = cursor.lastrowid
                        cursor.close()
                        conn.close()
                        return jsonify({"status": "success", "id": user_id, "name": name, "email": email})
                    except Exception as e:
                        return jsonify({"error": str(e)}), 500
                
                @app.route('/api/login', methods=['POST'])
                def login():
                    data = request.json
                    email = data.get('email')
                    password = data.get('password')
                    
                    conn = get_db_connection()
                    if not conn: return jsonify({"error": "Database connection failed"}), 500
                    
                    try:
                        cursor = conn.cursor(dictionary=True)
                        cursor.execute("SELECT * FROM users WHERE email = %s", (email,))
                        user = cursor.fetchone()
                        cursor.close()
                        conn.close()
                        
                        if user and check_password_hash(user['password'], password):
                            return jsonify({"status": "success", "id": user['id'], "name": user['name'], "email": user['email']})
                        else:
                            return jsonify({"error": "Invalid email or password"}), 401
                    except Exception as e:
                        return jsonify({"error": str(e)}), 500
                
                # ----- SUGGESTIONS ROUTE -----
                
                @app.route('/api/locations', methods=['GET'])
                def get_locations():
                    conn = get_db_connection()
                    if not conn: return jsonify({"error": "Database connection failed"}), 500
                    
                    try:
                        cursor = conn.cursor()
                        locations = set()
                        
                        try:
                            cursor.execute("SELECT DISTINCT origin FROM flights")
                            for row in cursor.fetchall(): locations.add(row[0])
                        except: pass
                            
                        try:
                            cursor.execute("SELECT DISTINCT destination FROM flights")
                            for row in cursor.fetchall(): locations.add(row[0])
                        except: pass
                            
                        try:
                            cursor.execute("SELECT DISTINCT location FROM hotels")
                            for row in cursor.fetchall(): locations.add(row[0])
                        except: pass
                            
                        try:
                            cursor.execute("SELECT DISTINCT origin FROM buses")
                            for row in cursor.fetchall(): locations.add(row[0])
                        except: pass
                
                        try:
                            cursor.execute("SELECT DISTINCT destination FROM buses")
                            for row in cursor.fetchall(): locations.add(row[0])
                        except: pass
                            
                        cursor.close()
                        conn.close()
                        
                        extra_cities = {
                            "Delhi", "Mumbai", "Bangalore", "Hyderabad", "Chennai", "Kolkata", "Pune", "Ahmedabad", "Jaipur", "Surat",
                            "Lucknow", "Kanpur", "Nagpur", "Indore", "Thane", "Bhopal", "Visakhapatnam", "Patna", "Vadodara", "Ghaziabad",
                            "Ludhiana", "Agra", "Nashik", "Faridabad", "Meerut", "Rajkot", "Varanasi", "Srinagar", "Aurangabad", "Amritsar",
                            "Navi Mumbai", "Ranchi", "Howrah", "Coimbatore", "Gwalior", "Vijayawada", "Jodhpur", "Madurai", "Raipur", "Kota",
                            "Guwahati", "Chandigarh", "Mysore", "Tiruchirappalli", "Bareilly", "Gurgaon", "Noida", "Kochi", "Dehradun", "Jammu",
                            "Mangalore", "Udaipur", "Goa", "Aligarh", "Jalandhar", "Bhubaneswar", "Salem", "Mira-Bhayandar", "Warangal", "Guntur",
                            "Bhiwandi", "Saharanpur", "Gorakhpur", "Bikaner", "Amravati", "Noida", "Jamshedpur", "Bhilai", "Cuttack", "Firozabad",
