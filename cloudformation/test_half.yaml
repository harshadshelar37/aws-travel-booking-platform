AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-Ready Travel Booking Platform on AWS.
  Public (ALB) -> App Layer (EC2 Auto Scaling) -> Private DB Layer (RDS MySQL)
  Fully Free Tier Eligible configuration by default.

# ============================================================
# PARAMETERS
# ============================================================
Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    Description: Environment name prefix for resources

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16

  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24

  PrivateDBSubnet1CIDR:
    Type: String
    Default: 10.0.21.0/24
  PrivateDBSubnet2CIDR:
    Type: String
    Default: 10.0.22.0/24

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: "bat17"
    Description: EC2 Key Pair for SSH access

  InstanceType:
    Type: String
    Default: t3.micro
    Description: Free Tier eligible EC2 instance type

  AppMinSize:
    Type: Number
    Default: 1
  AppMaxSize:
    Type: Number
    Default: 2
  AppDesiredCapacity:
    Type: Number
    Default: 1

  DBUsername:
    Type: String
    Default: admin
    NoEcho: true

  DBPassword:
    Type: String
    Default: "TravelDbPass123!"
    NoEcho: true
    MinLength: 8
    Description: Master password for RDS (min 8 chars)

  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    Description: Free Tier eligible DB instance class

  EnableMultiAZ:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Multi-AZ is NOT Free Tier eligible - keep false

  DBAllocatedStorage:
    Type: Number
    Default: 20

  NotificationEmail:
    Type: String
    Default: "alerts@example.com"
    Description: Email address to receive CloudWatch SNS alerts

# ============================================================
# RESOURCES
# ============================================================
Resources:

  # ---------------- VPC ----------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-igw

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ---------------- Public Subnets ----------------
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-subnet-2

  # ---------------- Private DB Subnets ----------------
  PrivateDBSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateDBSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-private-db-subnet-1

  PrivateDBSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateDBSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-private-db-subnet-2

  # ---------------- Route Tables ----------------
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ---------------- Security Groups ----------------
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from internet to ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-alb-sg

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from ALB SG and restricted SSH
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0 # Restricted to 0.0.0.0/0 for ease of access (update later)
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ec2-sg

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow MySQL from app tier SG
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-rds-sg

  # ---------------- S3 Bucket ----------------
  AppS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${EnvironmentName}-travel-assets-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ---------------- IAM Role ----------------
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-travel-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy


  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  # ---------------- SNS Topic for Alerts ----------------
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${EnvironmentName}-travel-alerts

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # ---------------- Launch Template ----------------
  AppLaunchTemplate:
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          default:
            - setup
        setup:
          files:
            /home/ec2-user/app/backend/app.py:
              content: |
                import os
                import pymysql
                from flask import Flask, jsonify, request, send_from_directory
                from dotenv import load_dotenv
                
                # Load environment variables
                load_dotenv()
                
                app = Flask(__name__, static_folder='../frontend', static_url_path='/')
                
                # Database connection details
                DB_HOST = os.getenv("DB_HOST", "localhost")
                DB_USER = os.getenv("DB_USER", "root")
                DB_PASS = os.getenv("DB_PASS", "")
                DB_NAME = os.getenv("DB_NAME", "traveldb")
                
                def get_db_connection():
                    try:
                        connection = pymysql.connect(
                            host=DB_HOST,
                            user=DB_USER,
                            password=DB_PASS,
                            database=DB_NAME,
                            cursorclass=pymysql.cursors.DictCursor
                        )
                        return connection
                    except Exception as e:
                        print(f"Error connecting to DB: {e}")
                        return None
                
                # Serve Frontend
                @app.route('/')
                def index():
                    return app.send_static_file('index.html')
                
                # Health Check
                @app.route('/health')
                def health():
                    return jsonify({"status": "healthy"}), 200
                
                # ================== FLIGHTS API ==================
                @app.route('/api/flights', methods=['GET'])
                def get_flights():
                    conn = get_db_connection()
                    if not conn:
                        return jsonify({"error": "Database connection failed"}), 500
                    try:
                        with conn.cursor() as cursor:
                            cursor.execute("SELECT * FROM Flights")
                            flights = cursor.fetchall()
                        return jsonify(flights), 200
                    finally:
                        conn.close()
                
                # ================== HOTELS API ==================
                @app.route('/api/hotels', methods=['GET'])
                def get_hotels():
                    conn = get_db_connection()
                    if not conn:
                        return jsonify({"error": "Database connection failed"}), 500
                    try:
                        with conn.cursor() as cursor:
                            cursor.execute("SELECT * FROM Hotels")
                            hotels = cursor.fetchall()
                        return jsonify(hotels), 200
                    finally:
                        conn.close()
                
                # ================== CABS API ==================
                @app.route('/api/cabs', methods=['GET'])
                def get_cabs():
                    conn = get_db_connection()
                    if not conn:
                        return jsonify({"error": "Database connection failed"}), 500
                    try:
                        with conn.cursor() as cursor:
                            cursor.execute("SELECT * FROM Cab_Services")
                            cabs = cursor.fetchall()
                        return jsonify(cabs), 200
                    finally:
                        conn.close()
                
                # ================== PACKAGES API ==================
                @app.route('/api/packages', methods=['GET'])
                def get_packages():
                    conn = get_db_connection()
                    if not conn:
                        return jsonify({"error": "Database connection failed"}), 500
                    try:
                        with conn.cursor() as cursor:
                            cursor.execute("SELECT * FROM Holiday_Packages")
                            packages = cursor.fetchall()
                        return jsonify(packages), 200
                    finally:
                        conn.close()
                
                if __name__ == '__main__':
                    app.run(host='0.0.0.0', port=5000, debug=True)
              mode: '000644'
              owner: 'root'
              group: 'root'
