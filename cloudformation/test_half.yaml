            /etc/systemd/system/travel-backend.service:
              content: |
                [Unit]
                Description=Travel Booking Backend
                After=network.target
                
                [Service]
                User=ec2-user
                WorkingDirectory=/home/ec2-user/app/backend
                ExecStart=/usr/bin/python3 app.py
                Restart=always
                Environment=FLASK_APP=app.py
                
                [Install]
                WantedBy=multi-user.target
              mode: '000644'
              owner: 'root'
              group: 'root'
            /etc/nginx/conf.d/travel.conf:
              content: |
                server {
                    listen 80;
                    server_name _;
                    
                    root /home/ec2-user/app/frontend;
                    index index.html;
                
                    location / {
                        try_files $uri $uri/ /index.html;
                    }
                
                    location /api/ {
                        proxy_pass http://127.0.0.1:5000/;
                        proxy_set_header Host $host;
                        proxy_set_header X-Real-IP $remote_addr;
                    }
                }
              mode: '000644'
              owner: 'root'
              group: 'root'
