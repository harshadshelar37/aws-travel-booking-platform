            /home/ec2-user/app/frontend/style.css:
              content: |
                /* ===== Reset & Base ===== */
                * {
                    margin: 0;
                    padding: 0;
                    box-sizing: border-box;
                    font-family: 'Outfit', sans-serif;
                }
                
                :root {
                    --primary: #6366f1;
                    --primary-hover: #4f46e5;
                    --bg-color: #0f172a;
                    --text-color: #f8fafc;
                    --text-muted: #94a3b8;
                    --glass-bg: rgba(30, 41, 59, 0.7);
                    --glass-border: rgba(255, 255, 255, 0.1);
                    --gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
                }
                
                body {
                    background-color: var(--bg-color);
                    color: var(--text-color);
                    min-height: 100vh;
                    display: flex;
                    flex-direction: column;
                    overflow-x: hidden;
                }
                
                /* ===== Typography ===== */
                h1 {
                    font-size: 4rem;
                    font-weight: 800;
                    line-height: 1.2;
                    margin-bottom: 1rem;
                    background: var(--gradient);
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                }
                
                h2 {
                    font-size: 2.5rem;
                    font-weight: 600;
                    margin-bottom: 2rem;
                }
                
                p {
                    font-size: 1.1rem;
                    color: var(--text-muted);
                }
                
                /* ===== Navbar ===== */
                .navbar {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    padding: 1.5rem 5%;
                    background: rgba(15, 23, 42, 0.8);
                    backdrop-filter: blur(10px);
                    position: fixed;
                    width: 100%;
                    top: 0;
                    z-index: 1000;
                    border-bottom: 1px solid var(--glass-border);
                }
                
                .logo {
                    font-size: 1.8rem;
                    font-weight: 800;
                    background: var(--gradient);
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                    cursor: pointer;
                }
                
                .nav-links {
                    list-style: none;
                    display: flex;
                    gap: 2rem;
                }
                
                .nav-links a {
                    text-decoration: none;
                    color: var(--text-muted);
                    font-weight: 600;
                    transition: color 0.3s ease;
                    position: relative;
                }
                
                .nav-links a:hover, .nav-links a.active {
                    color: var(--text-color);
                }
                
                .nav-links a.active::after {
                    content: '';
                    position: absolute;
                    bottom: -5px;
                    left: 0;
                    width: 100%;
                    height: 2px;
                    background: var(--primary);
                    border-radius: 2px;
                }
                
                /* ===== Buttons ===== */
                .btn {
                    padding: 0.75rem 1.5rem;
                    border-radius: 8px;
                    font-weight: 600;
                    font-size: 1rem;
                    cursor: pointer;
                    transition: all 0.3s ease;
                    border: none;
                }
                
                .btn-primary {
                    background: var(--gradient);
                    color: white;
                    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
                }
                
                .btn-primary:hover {
                    transform: translateY(-2px);
                    box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
                }
                
                .btn-outline {
                    background: transparent;
                    color: var(--text-color);
                    border: 1px solid var(--glass-border);
                }
                
                .btn-outline:hover {
                    background: rgba(255, 255, 255, 0.05);
                }
                
                /* ===== Hero Section ===== */
                .hero {
                    margin-top: 100px;
                    padding: 4rem 5%;
                    text-align: center;
                    position: relative;
                }
                
                /* ===== Glass Card ===== */
                .glass-card {
                    background: var(--glass-bg);
                    backdrop-filter: blur(12px);
                    border: 1px solid var(--glass-border);
                    border-radius: 20px;
                    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
                }
                
                /* ===== Search Section ===== */
                .search-section {
                    padding: 0 5%;
                    margin-top: -2rem;
                    position: relative;
                    z-index: 10;
                }
                
                .search-container {
                    padding: 2rem;
                    max-width: 1000px;
                    margin: 0 auto;
                }
                
                .search-tabs {
                    display: flex;
                    gap: 1rem;
                    margin-bottom: 2rem;
                    border-bottom: 1px solid var(--glass-border);
                    padding-bottom: 1rem;
                }
                
                .tab-btn {
                    background: transparent;
                    border: none;
                    color: var(--text-muted);
                    font-size: 1.1rem;
                    font-weight: 600;
                    cursor: pointer;
                    padding: 0.5rem 1rem;
                    border-radius: 8px;
                    transition: all 0.3s ease;
                }
                
                .tab-btn:hover, .tab-btn.active {
                    color: var(--text-color);
                    background: rgba(255, 255, 255, 0.05);
                }
                
                .search-form {
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                    gap: 1.5rem;
                    align-items: flex-end;
                }
                
                .input-group {
                    display: flex;
                    flex-direction: column;
                    gap: 0.5rem;
                }
                
                .input-group label {
                    font-size: 0.9rem;
                    color: var(--text-muted);
                    font-weight: 600;
                }
                
                .input-group input {
                    padding: 1rem;
                    background: rgba(15, 23, 42, 0.8);
                    border: 1px solid var(--glass-border);
                    border-radius: 8px;
                    color: white;
                    font-size: 1rem;
                    transition: border-color 0.3s ease;
                }
                
                .input-group input:focus {
                    outline: none;
                    border-color: var(--primary);
                }
                
                .btn-search {
                    padding: 1rem;
                    height: 52px;
                }
                
                /* ===== Results Section ===== */
                .results-section {
                    padding: 4rem 5%;
                    max-width: 1200px;
                    margin: 0 auto;
                }
                
                .results-grid {
                    display: grid;
                    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                    gap: 2rem;
                }
                
                .result-card {
                    padding: 1.5rem;
                    transition: transform 0.3s ease, box-shadow 0.3s ease;
                }
                
                .result-card:hover {
                    transform: translateY(-5px);
                    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
                }
                
                .result-card h3 {
                    font-size: 1.5rem;
                    margin-bottom: 0.5rem;
                }
                
                .result-card .price {
                    font-size: 1.8rem;
                    font-weight: 800;
                    color: var(--primary);
                    margin: 1rem 0;
                }
                
                /* ===== Footer ===== */
                footer {
                    margin-top: auto;
                    text-align: center;
                    padding: 2rem;
                    border-top: 1px solid var(--glass-border);
                    background: rgba(15, 23, 42, 0.8);
                }
              mode: '000644'
              owner: 'root'
              group: 'root'
            /home/ec2-user/app/frontend/app.js:
              content: |
                document.addEventListener('DOMContentLoaded', () => {
                    const tabs = document.querySelectorAll('.tab-btn');
                    const navLinks = document.querySelectorAll('.nav-links a');
                    const searchForm = document.getElementById('search-form');
                    const resultsSection = document.getElementById('results-section');
                    const resultsGrid = document.getElementById('results-grid');
                    
                    let currentTab = 'flights';
                
                    // Tab switching logic
                    function switchTab(target) {
                        currentTab = target;
                        
                        // Update active classes for tabs
                        tabs.forEach(tab => {
                            if(tab.dataset.target === target) {
                                tab.classList.add('active');
                            } else {
                                tab.classList.remove('active');
                            }
                        });
                        
                        // Update active classes for nav links
                        navLinks.forEach(link => {
                            if(link.dataset.target === target) {
                                link.classList.add('active');
                            } else {
                                link.classList.remove('active');
                            }
                        });
                
                        // Hide results when switching tabs
                        resultsSection.style.display = 'none';
                        resultsGrid.innerHTML = '';
                    }
                
                    tabs.forEach(tab => {
                        tab.addEventListener('click', (e) => {
                            switchTab(e.target.dataset.target);
                        });
                    });
                
                    navLinks.forEach(link => {
                        link.addEventListener('click', (e) => {
                            e.preventDefault();
                            switchTab(e.target.dataset.target);
                        });
                    });
                
                    // Form Submission
                    searchForm.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        
                        // Show loading state
                        resultsSection.style.display = 'block';
                        resultsGrid.innerHTML = '<p>Loading results...</p>';
                
                        try {
                            // Fetch data from our backend API
                            const response = await fetch(`/api/${currentTab}`);
                            if (!response.ok) throw new Error('Failed to fetch data');
                            
                            const data = await response.json();
                            renderResults(data, currentTab);
                        } catch (error) {
                            resultsGrid.innerHTML = `<p style="color: #ef4444;">Error loading data. Please try again later.</p>`;
                            console.error(error);
                        }
                    });
                
                    // Render results based on tab
                    function renderResults(data, type) {
                        resultsGrid.innerHTML = '';
                        
                        if (data.length === 0) {
                            resultsGrid.innerHTML = '<p>No results found.</p>';
                            return;
                        }
                
                        data.forEach(item => {
                            const card = document.createElement('div');
                            card.className = 'glass-card result-card';
                            
                            let html = '';
                            
                            if (type === 'flights') {
                                html = `
                                    <h3>${item.flight_name}</h3>
                                    <p>${item.source} &rarr; ${item.destination}</p>
                                    <p>Departure: ${new Date(item.departure).toLocaleString()}</p>
                                    <div class="price">$${item.price}</div>
                                    <button class="btn btn-primary">Book Flight</button>
                                `;
                            } else if (type === 'hotels') {
                                html = `
                                    <h3>${item.hotel_name}</h3>
                                    <p>${item.city} | Rating:  ${item.rating}</p>
                                    <p>Available Rooms: ${item.rooms}</p>
                                    <div class="price">$${item.price} / night</div>
                                    <button class="btn btn-primary">Book Hotel</button>
                                `;
                            } else if (type === 'cabs') {
                                html = `
                                    <h3>${item.cab_name}</h3>
                                    <p>Location: ${item.location}</p>
                                    <p>Driver: ${item.driver}</p>
                                    <div class="price">$${item.price}</div>
                                    <button class="btn btn-primary">Book Cab</button>
                                `;
                            } else if (type === 'packages') {
                                html = `
                                    <h3>${item.package_name}</h3>
                                    <p>${item.description}</p>
                                    <p>Duration: ${item.days} days</p>
                                    <div class="price">$${item.price}</div>
                                    <button class="btn btn-primary">Book Package</button>
                                `;
                            }
                
                            card.innerHTML = html;
                            resultsGrid.appendChild(card);
                        });
                    }
                });
              mode: '000644'
              owner: 'root'
              group: 'root'
            /home/ec2-user/app/database/schema.sql:
              content: |
                CREATE TABLE IF NOT EXISTS Users (
                    user_id INT AUTO_INCREMENT PRIMARY KEY,
                    name VARCHAR(100) NOT NULL,
                    email VARCHAR(100) UNIQUE NOT NULL,
                    password VARCHAR(255) NOT NULL,
                    phone VARCHAR(20),
                    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
                );
                
                CREATE TABLE IF NOT EXISTS Flights (
                    flight_id INT AUTO_INCREMENT PRIMARY KEY,
                    flight_name VARCHAR(100) NOT NULL,
                    source VARCHAR(100) NOT NULL,
                    destination VARCHAR(100) NOT NULL,
                    departure DATETIME NOT NULL,
                    arrival DATETIME NOT NULL,
                    price DECIMAL(10, 2) NOT NULL,
                    available_seats INT NOT NULL
                );
                
                CREATE TABLE IF NOT EXISTS Hotels (
                    hotel_id INT AUTO_INCREMENT PRIMARY KEY,
                    hotel_name VARCHAR(150) NOT NULL,
                    city VARCHAR(100) NOT NULL,
                    rating DECIMAL(2, 1) DEFAULT 0.0,
                    price DECIMAL(10, 2) NOT NULL,
                    rooms INT NOT NULL
                );
                
                CREATE TABLE IF NOT EXISTS Cab_Services (
                    cab_id INT AUTO_INCREMENT PRIMARY KEY,
                    cab_name VARCHAR(100) NOT NULL,
                    driver VARCHAR(100) NOT NULL,
                    location VARCHAR(100) NOT NULL,
                    price DECIMAL(10, 2) NOT NULL,
                    status ENUM('Available', 'Booked', 'Maintenance') DEFAULT 'Available'
                );
                
                CREATE TABLE IF NOT EXISTS Holiday_Packages (
                    package_id INT AUTO_INCREMENT PRIMARY KEY,
                    package_name VARCHAR(150) NOT NULL,
                    days INT NOT NULL,
                    price DECIMAL(10, 2) NOT NULL,
                    description TEXT
                );
                
                CREATE TABLE IF NOT EXISTS Bookings (
                    booking_id INT AUTO_INCREMENT PRIMARY KEY,
                    user_id INT,
                    booking_type ENUM('Flight', 'Hotel', 'Cab', 'Package') NOT NULL,
                    reference_id INT NOT NULL, -- Refers to flight_id, hotel_id, etc. based on type
                    booking_date TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                    status ENUM('Pending', 'Confirmed', 'Cancelled') DEFAULT 'Pending',
                    payment_status ENUM('Unpaid', 'Paid', 'Refunded') DEFAULT 'Unpaid',
                    FOREIGN KEY (user_id) REFERENCES Users(user_id) ON DELETE CASCADE
                );
                
                CREATE TABLE IF NOT EXISTS Payments (
                    payment_id INT AUTO_INCREMENT PRIMARY KEY,
                    booking_id INT,
                    amount DECIMAL(10, 2) NOT NULL,
                    payment_mode ENUM('Credit Card', 'Debit Card', 'UPI', 'Net Banking') NOT NULL,
                    status ENUM('Success', 'Failed', 'Pending') DEFAULT 'Pending',
                    transaction_id VARCHAR(100) UNIQUE,
                    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                    FOREIGN KEY (booking_id) REFERENCES Bookings(booking_id) ON DELETE CASCADE
                );
              mode: '000644'
              owner: 'root'
              group: 'root'
