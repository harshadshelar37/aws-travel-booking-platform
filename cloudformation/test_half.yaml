            01_install_deps:
              command: "pip3 install -r /home/ec2-user/app/backend/requirements.txt"
            02_remove_default_nginx:
              command: "rm -f /etc/nginx/conf.d/default.conf"
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${EnvironmentName}-app-lt
      LaunchTemplateData:
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyPairName
        ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        NetworkInterfaces:
          - AssociatePublicIpAddress: true
            DeviceIndex: 0
            Groups:
              - !Ref EC2SecurityGroup
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum update -y
            yum install -y nginx python3 python3-pip mariadb105
            
            curl -O https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz
            python3 -m pip install aws-cfn-bootstrap-py3-latest.tar.gz
            
            /usr/local/bin/cfn-init -v --stack ${AWS::StackName} --resource AppLaunchTemplate --region ${AWS::Region} --configsets default
            
            mysql -h ${RDSInstance.Endpoint.Address} -P 3306 -u ${DBUsername} -p${DBPassword} < /home/ec2-user/app/database/schema.sql
            mysql -h ${RDSInstance.Endpoint.Address} -P 3306 -u ${DBUsername} -p${DBPassword} < /home/ec2-user/app/database/sample_data.sql
            
            cat << 'EOT' > /home/ec2-user/app/backend/.env
            DB_HOST=${RDSInstance.Endpoint.Address}
            DB_USER=${DBUsername}
            DB_PASS=${DBPassword}
            DB_NAME=travel_db
            EOT
            
            chown -R ec2-user:ec2-user /home/ec2-user/app
            
            systemctl enable travel-backend
            systemctl start travel-backend
            systemctl enable nginx
            systemctl start nginx
  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub ${EnvironmentName}-mysql-db
      Engine: mysql
      EngineVersion: '8.0'
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref DBAllocatedStorage
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      MultiAZ: !Ref EnableMultiAZ
      StorageType: gp2
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups: [!Ref RDSSecurityGroup]
      BackupRetentionPeriod: 1
      PubliclyAccessible: false

# ============================================================
# OUTPUTS
# ============================================================
Outputs:
  ALBDNSName:
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  RDSEndpoint:
    Value: !GetAtt RDSInstance.Endpoint.Address
  S3BucketName:
    Value: !Ref AppS3Bucket
